apiVersion: v1
kind: Service
metadata:
  name: ark-apiserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ark-apiserver.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: https
      port: {{ .Values.apiserver.port }}
      targetPort: {{ .Values.apiserver.port }}
      protocol: TCP
  selector:
    {{- include "ark-apiserver.selectorLabels" . | nindent 4 }}
