apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: agent-partial-tool-valuefrom
spec:
  description: Test partial tool parameters with valueFrom (configMapKeyRef)
  steps:
    - name: setup
      try:
        - script:
            timeout: 180s
            content: |
              bash ../shared/install-mock-llm.sh
            env:
              - name: NAMESPACE
                value: ($namespace)
        - wait:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Model
            name: test-model
            timeout: 3m
            for:
              condition:
                name: ModelAvailable
                value: 'True' 
      catch:
        - events: {}
        - describe:
            apiVersion: v1
            kind: Pod
            selector: app.kubernetes.io/name=mock-llm
        - describe:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Model
            name: test-model

    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: tool-config
              data:
                default-city: "Chicago"
        - apply:
            resource:
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Tool
              metadata:
                name: get-coordinates
              spec:
                type: http
                description: "Returns coordinates for a city"
                inputSchema:
                  type: object
                  properties:
                    city:
                      type: string
                      description: City name
                  required: ["city"]
                http:
                  url: https://geocoding-api.open-meteo.com/v1/search?name={city}&count=1
        - apply:
            resource:
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Agent
              metadata:
                name: partial-tool-valuefrom-agent
              spec:
                description: Agent with partial tool using valueFrom
                modelRef:
                  name: test-model
                tools:
                  - type: http
                    name: get-chicago-coordinates
                    description: Get coordinates for city from config
                    partial:
                      name: get-coordinates
                      parameters:
                        - name: city
                          valueFrom:
                            configMapKeyRef:
                              name: tool-config
                              key: default-city
        - assert:
            timeout: 10s
            resource:
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Agent
              metadata:
                name: partial-tool-valuefrom-agent
              status:
                (conditions[?type == 'Available']):
                  - status: "True"
      catch:
        - events: {}
        - describe:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Agent
            name: partial-tool-valuefrom-agent

    - name: run-query
      try:
        - apply:
            resource:
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Query
              metadata:
                name: partial-tool-valuefrom-query
              spec:
                input: What are the coordinates?
                target:
                  type: agent
                  name: partial-tool-valuefrom-agent
        - wait:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Query
            name: partial-tool-valuefrom-query
            timeout: 60s
            for:
              condition:
                name: Completed
                value: 'True'
        - assert:
            timeout: 5s
            resource:
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Query
              metadata:
                name: partial-tool-valuefrom-query
              status:
                (response != null): true
                (response.target.name): 'partial-tool-valuefrom-agent'
      catch:
        - events: {}
        - describe:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Query
            name: partial-tool-valuefrom-query

      cleanup:
      - script:
          content: |
            helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
          env:
          - name: NAMESPACE
            value: ($namespace)
