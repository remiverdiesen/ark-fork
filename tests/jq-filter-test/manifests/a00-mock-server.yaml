apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-httpbin-config
data:
  expectations.json: |
    [
      {
        "httpRequest": {
          "method": "GET",
          "path": "/json"
        },
        "httpResponse": {
          "statusCode": 200,
          "headers": {
            "Content-Type": ["application/json"]
          },
          "body": {
            "type": "JSON",
            "json": {
              "slideshow": {
                "author": "Yours Truly",
                "date": "date of publication",
                "slides": [
                  {
                    "title": "Wake up to WonderWidgets!",
                    "type": "all"
                  },
                  {
                    "items": [
                      "Why WonderWidgets are great",
                      "Who buys WonderWidgets"
                    ],
                    "title": "Overview",
                    "type": "two"
                  }
                ],
                "title": "Sample Slide Show"
              }
            }
          }
        }
      }
    ]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-httpbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-httpbin
  template:
    metadata:
      labels:
        app: mock-httpbin
    spec:
      containers:
      - name: mock-server
        image: mockserver/mockserver:5.15.0
        ports:
        - containerPort: 1080
        env:
        - name: MOCKSERVER_LOG_LEVEL
          value: INFO
        - name: MOCKSERVER_INITIALIZATION_JSON_PATH
          value: /config/expectations.json
        volumeMounts:
        - name: config
          mountPath: /config
      volumes:
      - name: config
        configMap:
          name: mock-httpbin-config

---
apiVersion: v1
kind: Service
metadata:
  name: mock-httpbin
spec:
  selector:
    app: mock-httpbin
  ports:
  - port: 80
    targetPort: 1080
