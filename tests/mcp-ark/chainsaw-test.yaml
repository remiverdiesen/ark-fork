apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ark-mcp-integration
  labels:
    requires-images: "true"
spec:
  steps:
  - name: deploy-ark-mcp-server
    try:
    - script:
        content: |
          helm upgrade --install ark-mcp ../../services/ark-mcp/chart \
            --namespace $NAMESPACE \
            --set serviceAccount.name=ark-mcp-sa-$NAMESPACE \
            ${ARK_MCP_IMAGE:+--set app.image.repository=${ARK_MCP_IMAGE}} \
            ${ARK_MCP_IMAGE_TAG:+--set app.image.tag=${ARK_MCP_IMAGE_TAG}} \
            --wait --timeout=360s
        env:
        - name: NAMESPACE
          value: ($namespace)
        timeout: 420s
    catch:
    - script:
        content: |
          echo "=== Pods ==="
          kubectl -n $NAMESPACE get pods -o wide
          echo "=== Events ==="
          kubectl -n $NAMESPACE get events --sort-by='.lastTimestamp'
          echo "=== Describe ark-mcp pod ==="
          kubectl -n $NAMESPACE describe pod -l app=ark-mcp
          echo "=== Logs ark-mcp ==="
          kubectl -n $NAMESPACE logs -l app=ark-mcp --tail=200 --all-containers || true
        env:
        - name: NAMESPACE
          value: ($namespace)

  - name: wait-for-mcpserver-ready
    try:
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: MCPServer
          metadata:
            name: ark-mcp
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: MCPServer
        name: ark-mcp
        timeout: 2m
        for:
          condition:
            name: Available
            value: 'True'

  - name: validate-tool-discovery
    try:
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: MCPServer
          metadata:
            name: ark-mcp
          status:
            (contains(conditions[?type == 'Discovering'].reason || `[]`, 'DiscoveryComplete')): true
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Tool
          metadata:
            name: ark-mcp-list-agents
            ownerReferences:
            - apiVersion: ark.mckinsey.com/v1alpha1
              kind: MCPServer
              name: ark-mcp
          status:
            state: Ready
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Tool
          metadata:
            name: ark-mcp-query-agent
            ownerReferences:
            - apiVersion: ark.mckinsey.com/v1alpha1
              kind: MCPServer
              name: ark-mcp
          status:
            state: Ready
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: MCPServer
        name: ark-mcp

    cleanup:
    - script:
        content: |
          helm uninstall ark-mcp --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
