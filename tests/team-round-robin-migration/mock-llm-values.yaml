terminationGracePeriodSeconds: 3
ark:
  model:
    name: test-model

config:
  rules:
  - path: "/v1/models"
    method: "GET"
    response:
      status: 200
      content: |
        {
          "object": "list",
          "data": [
            {
              "id": "gpt-4.1-mini",
              "object": "model",
              "owned_by": "openai"
            }
          ]
        }

  - path: "/v1/chat/completions"
    response:
      status: 200
      content: '{"choices":[{"message":{"role":"assistant","content":"OK"},"finish_reason":"stop"}]}'

  - path: "/v1/chat/completions"
    match: "contains(body.messages[0].content || '', 'Agent A')"
    response:
        status: 200
        content: '{"choices":[{"message":{"role":"assistant","content":"AGENT-A: Task completed successfully."},"finish_reason":"stop"}]}'

  - path: "/v1/chat/completions"
    match: "contains(body.messages[0].content || '', 'Agent B')"
    response:
        status: 200
        content: '{"choices":[{"message":{"role":"assistant","content":"AGENT-B: Task completed successfully."},"finish_reason":"stop"}]}'
