apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: a2a-blocking-task-failed
spec:
  description: Test A2A agent with blocking Task that fails with error
  steps:
  - name: step-1
    try:
    # Install mock-llm with A2A agents enabled
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)
    # Wait for countdown A2AServer to be Ready
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1prealpha1
          kind: A2AServer
          metadata:
            name: mock-llm-countdown
          status:
            (contains(conditions[?type == 'Ready'].status || `[]`, 'True')): true
    # Apply Query targeting countdown agent with invalid input
    - apply:
        file: manifests/a01-query.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: countdown-fail-query
          status:
            phase: error
    # Verify error message from failed task
    - assert:
        timeout: 1s
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: countdown-fail-query
          status:
            (response != null): true
            (response.target.name): 'countdown-agent'
            (contains(response.content, 'Cannot countdown from negative number -5')): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1prealpha1
        kind: A2AServer
        name: mock-llm-countdown
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: countdown-fail-query

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
