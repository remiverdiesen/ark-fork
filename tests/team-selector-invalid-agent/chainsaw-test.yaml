apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: team-selector-invalid-agent
  labels:
    standard: "true"
spec:
  description: Test selector team returning invalid agent name and conversation ending
  steps:
  - name: setup-and-test
    try:
    # Install mock-llm with custom rules
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)
    # Wait for Model to be available
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model
        timeout: 90s
        for:
          condition:
            name: ModelAvailable
            value: 'True'
    # Apply all manifests
    - apply:
        file: manifests/*.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-invalid-selector-query
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    # Validate response exists and contains warning about invalid agent
    - assert:
        timeout: 5s
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: test-invalid-selector-query
          status:
            (response != null): true
            (response.target.name): 'test-selector-team'
    # Validate response contains invalid agent warning in raw field
    - script:
        content: |
          RESPONSE=$(kubectl -n $NAMESPACE get query test-invalid-selector-query -o jsonpath='{.status.response.raw}')

          echo "=== Query Response Raw ==="
          echo "$RESPONSE"
          echo "=========================="

          # Check for invalid agent warning message
          if echo "$RESPONSE" | grep -qi "Selector returned invalid agent name: invalid-agent-name"; then
            echo "✓ Found invalid agent name warning"
          else
            echo "✗ Missing invalid agent name warning"
            exit 1
          fi

          echo ""
          echo "✓ Test passed: Selector returned invalid name and conversation ended correctly"
        env:
        - name: NAMESPACE
          value: ($namespace)
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-invalid-selector-query

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
