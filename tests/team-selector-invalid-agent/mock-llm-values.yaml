ark:
  model:
    name: test-model

config:
  rules:
  # Health/models endpoint for Model availability check
  - path: "/v1/models"
    method: "GET"
    response:
      status: 200
      content: |
        {
          "object": "list",
          "data": [
            {
              "id": "gpt-4.1-mini",
              "object": "model",
              "owned_by": "openai"
            }
          ]
        }

  # Catch-all - return invalid agent name to test termination
  - path: "/v1/chat/completions"
    response:
      status: 200
      content: '{"choices":[{"message":{"role":"assistant","content":"invalid-agent-name"},"finish_reason":"stop"}]}'
