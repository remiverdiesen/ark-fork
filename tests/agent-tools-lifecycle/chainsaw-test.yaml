apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: agent-tools-lifecycle
spec:
  description: Test agent state transitions based on tool availability
  steps:
  - name: setup-mock-llm
    try:
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)

  - name: agent-pending-without-tool
    try:
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model
        timeout: 90s
        for:
          condition:
            name: ModelAvailable
            value: 'True'
    # Skip Tool creation to test for 'Pending' state of Agent as Tool is missing
    - apply:
        file: manifests/a04-test-agent.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: test-agent
          status:
            conditions:
            - type: Available
              status: "False"
              reason: ToolNotFound
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Agent
        name: test-agent

  - name: agent-ready-with-tool
    try:
    - apply:
        file: manifests/a03-test-tool.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Tool
          metadata:
            name: test-tool
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: test-agent
          status:
            conditions:
            - type: Available
              status: "True"
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Agent
        name: test-agent

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
