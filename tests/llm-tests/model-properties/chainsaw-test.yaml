apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: model-properties
  labels:
    llm: "true"
spec:
  description: Test model with custom properties (temperature, max_tokens, top_p, penalties)
  timeouts:
    apply: 60s
    assert: 300s
    exec: 120s
  steps:
  - name: setup-model
    try:
    - script:
        content: bash ../setup/setup-${MODEL}.sh $NAMESPACE
        env:
        - name: NAMESPACE
          value: ($namespace)
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model
        timeout: 3m
        for:
          condition:
            name: ModelAvailable
            value: 'True'

  - name: create-model-with-properties
    try:
    - script:
        content: bash ../setup/setup-model-properties.sh $NAMESPACE
        env:
        - name: NAMESPACE
          value: ($namespace)
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model-properties
        timeout: 3m
        for:
          condition:
            name: ModelAvailable
            value: 'True'
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model-properties

  - name: run-query
    try:
    - apply:
        file: manifests/agent.yaml
    - apply:
        file: manifests/query.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: properties-test-agent
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: model-properties-query
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: model-properties-query
          status:
            (response != null): true
            (response.target.name): 'properties-test-agent'
            (length(response.content) > `5`): true
            (length(response.content) < `200`): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: model-properties-query
