apiVersion: ark.mckinsey.com/v1alpha1
kind: Model
metadata:
  name: test-model-overrides
  labels:
    environment: test
    override-target: "true"
spec:
  type: completions
  provider: openai
  model:
    value: gpt-5
  pollInterval: 3s
  config:
    openai:
      baseUrl:
        value: http://mock-llm.($namespace).svc.cluster.local:6556/v1
      apiKey:
        value: mock-api-key
