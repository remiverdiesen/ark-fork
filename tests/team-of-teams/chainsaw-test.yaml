apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: team-of-teams
spec:
  description: Test hierarchical team structure with teams containing other teams as members
  steps:
  - name: setup-mock-llm
    try:
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)

  - name: wait-for-model-ready
    try:
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model-mock
        timeout: 90s
        for:
          condition:
            name: ModelAvailable
            value: 'True'

  - name: run-query
    try:
    - apply:
        file: manifests/*.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Team
          metadata:
            name: research-team
          spec:
            members:
            - type: agent
              name: researcher
            - type: agent
              name: analyst
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Team
          metadata:
            name: synthesis-team
          spec:
            members:
            - type: agent
              name: synthesizer
            - type: agent
              name: coordinator
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Team
          metadata:
            name: parent-team
          spec:
            members:
            - type: team
              name: research-team
            - type: team
              name: synthesis-team
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: team-of-teams-query
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: team-of-teams-query
          status:
            (response != null): true
            (response.target.name): 'parent-team'
            (response.content): 'coordinator-output'
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: team-of-teams-query

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
