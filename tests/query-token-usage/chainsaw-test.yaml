apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: query-token-usage
spec:
  description: Test query token usage tracking and validation
  steps:
  - name: setup-resources
    try:
    # Install mock-llm with token usage support
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)
    # Wait for Model to be available before creating agents/queries
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model
        timeout: 3m
        for:
          condition:
            name: ModelAvailable
            value: 'True' 
    # Apply agent and query
    - apply:
        file: manifests/*.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: token-test-agent

  # Wait fort the query to complete (error or success).
  - name: wait-for-query-completion
    try:
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: token-usage-query
        for:
          condition:
            name: Completed
            value: 'True'
  - name: validate-response
    try:
    - assert:
        # Fast check - the resource won't change since the query is complete.
        timeout: 1s
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: token-usage-query
          status:
            # Done - not error. Tokens match the mocked value.
            phase: done
            (response != null): true
            (response.target.name): 'token-test-agent'
            (response.content): "Please explain the concept of distributed computing in detail, including key principles, \nadvantages, challenges, and real-world applications. Provide examples of distributed \nsystems and discuss how they handle consistency, availability, and partition tolerance.\n"
            (tokenUsage.promptTokens): 50
            (tokenUsage.completionTokens): 100
            (tokenUsage.totalTokens): 150
    catch:
      # In the case of any errors, show the full query for troubleshooting.
      - describe:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          name: token-usage-query
      - events: {}

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
