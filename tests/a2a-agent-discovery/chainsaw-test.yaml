apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: a2a-agent-discovery
spec:
  description: Test A2A agent discovery from mock-llm A2AServer resources
  steps:
  - name: step-1
    try:
    # Install mock-llm with A2A agents enabled
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)
    # Wait for A2AServer resources to be created
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1prealpha1
          kind: A2AServer
          metadata:
            name: mock-llm-echo
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1prealpha1
          kind: A2AServer
          metadata:
            name: mock-llm-countdown
    - wait:
        apiVersion: ark.mckinsey.com/v1prealpha1
        kind: A2AServer
        name: mock-llm-echo
        timeout: 2m
        for:
          condition:
            name: Ready
            value: 'True'
    - wait:
        apiVersion: ark.mckinsey.com/v1prealpha1
        kind: A2AServer
        name: mock-llm-countdown
        timeout: 2m
        for:
          condition:
            name: Ready
            value: 'True'
    # Verify agent addresses are resolved
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1prealpha1
          kind: A2AServer
          metadata:
            name: mock-llm-echo
          status:
            (lastResolvedAddress != null): true
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1prealpha1
          kind: A2AServer
          metadata:
            name: mock-llm-countdown
          status:
            (lastResolvedAddress != null): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1prealpha1
        kind: A2AServer
        name: mock-llm-echo
    - describe:
        apiVersion: ark.mckinsey.com/v1prealpha1
        kind: A2AServer
        name: mock-llm-countdown

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
