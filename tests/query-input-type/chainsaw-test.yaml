apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: query-input-types
spec:
  description: Test query with user input type
  steps:
  - name: setup-mock-llm
    try:
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)

  - name: wait-for-model-ready
    try:
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model-mock
        timeout: 90s
        for:
          condition:
            name: ModelAvailable
            value: 'True'

  - name: setup-agent
    try:
    - apply:
        file: manifests/a03-agent.yaml

  - name: test-default-input
    try:
    - apply:
        file: manifests/query-input-type-default.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-input-default
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: test-query-input-default
          status:
            (response != null): true
            (response.target.name): 'test-agent'
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-input-default

  - name: test-user-input
    try:
    - apply:
        file: manifests/query-input-type-user.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-input-type-user
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: test-query-input-type-user
          status:
            (response != null): true
            (response.target.name): 'test-agent'
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-input-type-user

  - name: test-default-invalid-input
    try:
    - apply:
        file: manifests/query-input-type-default-invalid-input.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-default-invalid-input
        timeout: 2m
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: test-query-default-invalid-input
          status:
            phase: error
            (contains(response.content, 'failed to get input string')): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-default-invalid-input

  - name: test-user-invalid-input
    try:
    - apply:
        file: manifests/query-input-type-user-invalid-input.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-input-type-user-invalid-input
        timeout: 2m
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: test-query-input-type-user-invalid-input
          status:
            phase: error
            (contains(response.content, 'failed to get input string')): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-input-type-user-invalid-input

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
