# Mock LLM configuration for agent-partial-tool-invalid test
ark:
  model:
    name: test-model
    config:
      openai:
        # baseUrl will be set to http://mock-llm/v1 by the chart
        apiKey: mock-api-key

config:
  rules:
  - path: "/v1/models"
    method: "GET"
    response:
      status: 200
      content: |
        {
          "object": "list",
          "data": [
            {
              "id": "gpt-4.1-mini",
              "object": "model",
              "owned_by": "openai"
            }
          ]
        }

