config:
  rules:
  - path: "/v1/models"
    method: "GET"
    response:
      status: 200
      content: |
        {
          "object": "list",
          "data": [
            {
              "id": "gpt-4.1-mini",
              "object": "model",
              "owned_by": "openai"
            }
          ]
        }

  - path: "/v1/chat/completions"
    response:
      status: 500
      content: '"Unrecognised agent"'

  - path: "/v1/chat/completions"
    match: "contains(body.messages[-1].content || '', 'Select the next participant')"
    response:
      status: 200
      content: '{"choices":[{"message":{"role":"assistant","content":"researcher"},"finish_reason":"stop"}],"usage":{"prompt_tokens":60,"completion_tokens":1,"total_tokens":61}}'

  - path: "/v1/chat/completions"
    match: "contains(body.messages[1].content || '', 'RESEARCH:')"
    response:
      status: 200
      content: '{"choices":[{"message":{"role":"assistant","content":"analyst"},"finish_reason":"stop"}],"usage":{"prompt_tokens":80,"completion_tokens":1,"total_tokens":81}}'

  - path: "/v1/chat/completions"
    match: "contains(body.messages[1].content || '', 'ANALYSIS:')"
    response:
      status: 200
      content: '{"choices":[{"message":{"role":"assistant","tool_calls":[{"id":"call_terminate","type":"function","function":{"name":"terminate","arguments":"{\"response\": \"COORDINATION: Research and analysis complete. The team has produced a comprehensive assessment of microservices architecture.\"}"}}]},"finish_reason":"tool_calls"}],"usage":{"prompt_tokens":100,"completion_tokens":20,"total_tokens":120}}'

  - path: "/v1/chat/completions"
    match: "contains(body.messages[0].content || '', 'research specialist')"
    response:
      status: 200
      content: '{"choices":[{"message":{"role":"assistant","content":"RESEARCH: Microservices enable independent scaling and faster deployment cycles, but introduce operational complexity and network overhead."},"finish_reason":"stop"}],"usage":{"prompt_tokens":70,"completion_tokens":18,"total_tokens":88}}'

  - path: "/v1/chat/completions"
    match: "contains(body.messages[0].content || '', 'strategic analyst')"
    response:
      status: 200
      content: '{"choices":[{"message":{"role":"assistant","content":"ANALYSIS: Key patterns identified - scalability benefits outweigh complexity costs for teams over 50 engineers. Recommend phased adoption strategy."},"finish_reason":"stop"}],"usage":{"prompt_tokens":90,"completion_tokens":22,"total_tokens":112}}'
