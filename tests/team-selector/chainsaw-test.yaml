apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: team-selector
spec:
  description: Test selector team strategy with AI-driven participant selection
  steps:
  - name: setup-mock-llm
    try:
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)

  - name: wait-for-model-ready
    try:
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model-mock
        timeout: 90s
        for:
          condition:
            name: ModelAvailable
            value: 'True'

  - name: run-query
    try:
    - apply:
        file: manifests/*.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: researcher
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: analyst
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: coordinator
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Team
          metadata:
            name: selector-team
          spec:
            strategy: selector
            maxTurns: 6
            selector:
              agent: coordinator
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: selector-team-query
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: selector-team-query

  - name: validate-selector-execution
    try:
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: selector-team-query
          status:
            (response != null): true
            (response.target.name): 'selector-team'
            (contains(response.raw, 'RESEARCH:')): true
            (contains(response.raw, 'ANALYSIS:')): true
            (contains(response.raw, 'COORDINATION:')): true
            (tokenUsage.totalTokens > `50`): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: selector-team-query

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
