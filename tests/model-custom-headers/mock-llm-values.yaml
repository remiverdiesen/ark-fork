# Mock LLM configuration for custom headers test
# Echoes back received headers as JSON for verification
terminationGracePeriodSeconds: 3
ark:
  model:
    name: test-model-custom-headers
    headers:
    - name: X-Consumer-Application
      value:
        value: ark-chainsaw-test-value
    - name: X-Authorization-Session
      value:
        valueFrom:
          secretKeyRef:
            name: test-custom-headers
            key: auth-token
    - name: X-Consumer-Group
      value:
        valueFrom:
          configMapKeyRef:
            name: test-custom-headers
            key: consumer-group

config:
  rules:
  - path: "/v1/models"
    method: "GET"
    response:
      status: 200
      content: |
        {
          "object": "list",
          "data": [
            {
              "id": "gpt-4.1-mini",
              "object": "model",
              "owned_by": "openai"
            }
          ]
        }

  - path: "/v1/chat/completions"
    match: "@"
    response:
      status: 200
      content: |
        {
          "id": "mock-{{timestamp}}",
          "object": "chat.completion",
          "model": "{{jmes request body.model}}",
          "choices": [{
            "message": {
              "role": "assistant",
              "content": {{jmes request headers}}
            },
            "finish_reason": "stop"
          }]
        }
