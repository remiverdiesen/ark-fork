apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: model-custom-headers
spec:
  description: Test model with custom HTTP headers from static values, Secrets, and ConfigMaps
  steps:
  - name: step-1
    try:
    # Install mock-llm with Ark Model and custom headers
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)
    # Apply Secret and ConfigMap for headers
    - apply:
        file: manifests/a0[1-2]-*.yaml
    # Wait for Model to be available
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model-custom-headers
        timeout: 3m
        for:
          condition:
            name: ModelAvailable
            value: 'True' 
    # Apply Agent and Query
    - apply:
        file: manifests/a0[5-6]-*.yaml
    # Wait for Query to complete
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: custom-headers-query
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    # Verify headers were received correctly
    # Mock-llm echoes back the headers object as JSON in the response content
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: custom-headers-query
          status:
            (response != null): true
            (response.target.name): 'headers-test-agent'
            # Headers are echoed back as JSON object (Express lowercases header names)
            (contains(response.content, '"x-consumer-application":"ark-chainsaw-test-value"')): true
            (contains(response.content, '"x-authorization-session":"test-secret-token-chainsaw-12345"')): true
            (contains(response.content, '"x-consumer-group":"chainsaw-test-consumer-group"')): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: custom-headers-query

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
