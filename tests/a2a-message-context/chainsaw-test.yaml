apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: a2a-message-context
spec:
  description: Test A2A contextId annotation for stateful conversations
  steps:
  - name: setup-mock-llm
    try:
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1prealpha1
          kind: A2AServer
          metadata:
            name: mock-llm-message-counter
          status:
            (contains(conditions[?type == 'Ready'].status || `[]`, 'True')): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1prealpha1
        kind: A2AServer
        name: mock-llm-message-counter

  - name: test-first-query
    try:
    - apply:
        file: manifests/a01-query-first.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: message-counter-first
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        timeout: 1s
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: message-counter-first
          status:
            (response != null): true
            (contains(response.content || '', '1 message(s) received')): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: message-counter-first

  - name: test-second-query-with-context
    try:
    - script:
        content: |
          CONTEXT_ID=$(kubectl get query message-counter-first -n $NAMESPACE -o jsonpath='{.status.response.a2a.contextId}')
          if [ -z "$CONTEXT_ID" ]; then
            echo "ERROR: contextId not set in response a2a metadata" >&2
            exit 1
          fi
          CONV_ID=$(kubectl get query message-counter-first -n $NAMESPACE -o jsonpath='{.status.conversationId}')
          if [ -z "$CONV_ID" ]; then
            echo "ERROR: conversationId not set in status" >&2
            exit 1
          fi
          printf '%s' "$CONTEXT_ID"
        env:
        - name: NAMESPACE
          value: ($namespace)
        outputs:
        - name: contextId
          value: ($stdout)
    - apply:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: message-counter-second
            annotations:
              ark.mckinsey.com/a2a-context-id: ($contextId)
          spec:
            input: Second message
            target:
              type: agent
              name: message-counter-agent
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: message-counter-second
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        timeout: 1s
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: message-counter-second
          status:
            (response != null): true
            (contains(response.content || '', '2 message(s) received')): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: message-counter-second

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
