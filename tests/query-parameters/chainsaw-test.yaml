apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: query-parameters
spec:
  description: Test query parameter resolution from direct values, ConfigMaps, and Secrets
  steps:
  - name: setup-mock-llm
    try:
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)

  - name: wait-for-model-ready
    try:
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model-mock
        timeout: 90s
        for:
          condition:
            name: ModelAvailable
            value: 'True'

  - name: run-query
    try:
    - apply:
        file: manifests/*.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-with-params
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: test-query-with-params
          status:
            (response != null): true
            (response.target.name): 'test-agent'
            (contains(response.content, 'performance')): true
            (contains(response.content, 'Test Customer Corp')): true
            (contains(response.content, 'environment=test')): true
            (contains(response.content, 'comprehensive')): true
            (contains(response.content, 'priority=high')): true
            (contains(response.content, 'synthetic test data')): true
            (contains(response.content, 'https://test-api.example.com/data')): true
            (contains(response.content, 'test-access-key-12345')): true
            (contains(response.content, 'This is a test query for parameter validation')): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-with-params

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
