apiVersion: ark.mckinsey.com/v1alpha1
kind: Query
metadata:
  name: test-query-with-params
spec:
  # Has to be in a single line or it will break the mock-llm JSON when echoing it back
  input: "data_type={{.data_type}} customer={{.customer_name}} environment={{.environment}} method={{.analysis_method}} priority={{.priority_level}} source={{.data_source}} endpoint={{.api_endpoint}} key={{.access_key}} context={{.context_info}}"
  
  parameters:
    # Direct value parameters
    - name: data_type
      value: "performance"
    - name: customer_name
      value: "Test Customer Corp"
    
    # ConfigMap reference parameters
    - name: environment
      valueFrom:
        configMapKeyRef:
          name: query-config
          key: environment
    - name: analysis_method
      valueFrom:
        configMapKeyRef:
          name: query-config
          key: analysis_method
    - name: priority_level
      valueFrom:
        configMapKeyRef:
          name: query-config
          key: priority_level
    - name: data_source
      valueFrom:
        configMapKeyRef:
          name: query-config
          key: data_source
    
    # Secret reference parameters
    - name: api_endpoint
      valueFrom:
        secretKeyRef:
          name: query-secrets
          key: api_endpoint
    - name: access_key
      valueFrom:
        secretKeyRef:
          name: query-secrets
          key: access_key
    - name: context_info
      valueFrom:
        secretKeyRef:
          name: query-secrets
          key: context_info
  
  target:
    type: agent
    name: test-agent