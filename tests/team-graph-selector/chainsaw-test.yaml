apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: team-graph-selector
spec:
  description: Test selector team strategy with graph constraints
  steps:
  - name: setup-mock-llm
    try:
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)

  - name: wait-for-model-ready
    try:
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model-mock
        timeout: 90s
        for:
          condition:
            name: ModelAvailable
            value: 'True'

  - name: run-query
    try:
    - apply:
        file: manifests/*.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: coordinator
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: researcher
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: analyzer
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: writer
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Team
          metadata:
            name: graph-selector-team
          spec:
            strategy: selector
            selector:
              agent: coordinator
            graph:
              edges:
              - from: coordinator
                to: researcher
              - from: coordinator
                to: analyzer
              - from: researcher
                to: analyzer
              - from: analyzer
                to: writer
              - from: writer
                to: coordinator
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-graph-selector-team
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-graph-selector-team

  - name: validate-graph-execution
    try:
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: test-graph-selector-team
          status:
            (response != null): true
            (response.target.name): 'graph-selector-team'
            (contains(response.raw, 'RESEARCH:')): true
            (contains(response.raw, 'ANALYSIS:')): true
            (contains(response.raw, 'REPORT:')): true
            (contains(response.raw, 'COORDINATION COMPLETE:')): true
            (tokenUsage.totalTokens > `50`): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-graph-selector-team

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
