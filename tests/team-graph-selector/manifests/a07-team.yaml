apiVersion: ark.mckinsey.com/v1alpha1
kind: Team
metadata:
  name: graph-selector-team
spec:
  strategy: selector
  description: "Team with selector strategy and graph constraints"
  maxTurns: 10
  members:
    - type: agent
      name: coordinator
    - type: agent
      name: researcher
    - type: agent
      name: analyzer
    - type: agent
      name: writer
  selector:
    agent: coordinator
    selectorPrompt: |
      You are a team coordinator. Your job is to select the best next team member 
      to respond based on the conversation context.
      
      Available participants: {{.Participants}}
      Roles: {{.Roles}}
      Conversation history: {{.History}}
      
      Use the select-next-speaker tool to make your selection.

  graph:
    edges:
      # Coordinator can choose researcher or analyzer
      - from: coordinator
        to: researcher
      - from: coordinator
        to: analyzer
      # Researcher must go to analyzer
      - from: researcher
        to: analyzer
      # Analyzer must go to writer
      - from: analyzer
        to: writer
      # Writer can go back to coordinator to review
      - from: writer
        to: coordinator

