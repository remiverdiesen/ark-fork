apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: team-sequential-loops
spec:
  description: Test sequential team with loops execution with brainstormer, critic, and coordinator using terminate tool
  steps:
  - name: setup-mock-llm
    try:
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)

  - name: wait-for-model-ready
    try:
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model-mock
        timeout: 90s
        for:
          condition:
            name: ModelAvailable
            value: 'True'

  - name: run-query
    try:
    - apply:
        file: manifests/*.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: brainstormer
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: critic
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: coordinator
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Team
          metadata:
            name: sequential-loops-team
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: sequential-loops-query
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: sequential-loops-query
          status:
            (response != null): true
            (response.target.name): 'sequential-loops-team'
            (contains(response.raw, 'IDEA:')): true
            (contains(response.raw, 'CRITIQUE:')): true
            (contains(response.raw, 'COORDINATION:')): true
            (tokenUsage.totalTokens > `50`): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: sequential-loops-query

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
