apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: team-sequential
spec:
  description: Test sequential team execution with researcher, analyst, and summarizer
  timeouts:
    apply: 30s
    assert: 60s
    exec: 120s
  steps:
  - name: step-1
    try:
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)
    - apply:
        file: manifests/*.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model
        timeout: 3m
        for:
          condition:
            name: ModelAvailable
            value: 'True' 
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: researcher
          status:
            conditions:
            - type: Available
              status: "True"
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: analyst
          status:
            conditions:
            - type: Available
              status: "True"
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: summarizer
          status:
            conditions:
            - type: Available
              status: "True"
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Team
          metadata:
            name: sequential-research-team
          status:
            conditions:
            - type: Available
              status: "True"
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: sequential-team-query
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: sequential-team-query
          status:
            (response != null): true
            (contains(response.content, 'SUMMARY:')): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Agent
        name: researcher
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Agent
        name: analyst
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Agent
        name: summarizer
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Team
        name: sequential-research-team
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: sequential-team-query

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
