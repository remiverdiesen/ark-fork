apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: model-token-usage
spec:
  description: Test query token usage tracking for direct model targets
  steps:
  - name: setup-mock-llm
    try:
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)

  - name: wait-for-model-ready
    try:
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: model-token-test
        timeout: 90s
        for:
          condition:
            name: ModelAvailable
            value: 'True'

  - name: run-query
    try:
    - apply:
        file: manifests/a03-query.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: model-token-query
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'

  - name: validate-response
    try:
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: model-token-query
          status:
            (response != null): true
            (response.target.type): model
            (response.target.name): model-token-test
            (length(response.content) > `100`): true
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: model-token-query
          status:
            (tokenUsage.promptTokens): 100
            (tokenUsage.completionTokens): 200
            (tokenUsage.totalTokens): 300
    catch:
      - events: { }
      - describe:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          name: model-token-query

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
