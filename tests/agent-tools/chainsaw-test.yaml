apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: agent-tools
spec:
  description: Test agent with weather tool functionality
  timeouts:
    apply: 30s
    assert: 120s
  steps:
  - name: setup-mock-weather-api
    try:
    - apply:
        file: ../shared/mock-weather-api.yaml
    - wait:
        apiVersion: apps/v1
        kind: Deployment
        name: mock-weather-api
        timeout: 2m
        for:
          condition:
            name: Available
            value: 'True'
    - assert:
        resource:
          apiVersion: v1
          kind: Endpoints
          metadata:
            name: mock-weather-api
    - script:
        content: |
          MOCK_URL="http://mock-weather-api.$NAMESPACE.svc.cluster.local"
          echo "$(date -u +%H:%M:%S) starting kubectl run for mock weather readiness probe"
          kubectl run test-mock-weather-ready --image=curlimages/curl --rm -i --restart=Never -n $NAMESPACE -- \
            curl -f -s --retry 5 --retry-connrefused --retry-delay 1 "${MOCK_URL}/v1/forecast?latitude=40.71&longitude=-74.01&current_weather=true"
          echo "$(date -u +%H:%M:%S) mock weather readiness probe complete"
        env:
        - name: NAMESPACE
          value: ($namespace)
        timeout: 45s
    catch:
    - events: {}

  - name: setup-mock-llm
    try:
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)
    catch:
    - events: {}

  - name: wait-for-model
    try:
    # Wait for mock-llm Model to be available before applying dependent resources
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model
        timeout: 3m
        for:
          condition:
            name: ModelAvailable
            value: 'True' 
    catch:
    - script:
        content: |
          echo "=== Model not ready ==="
          kubectl get model -n $NAMESPACE -o yaml 2>/dev/null || true
        env:
        - name: NAMESPACE
          value: ($namespace)

  - name: deploy-resources
    try:
    - apply:
        file: manifests/a01-weather-tool.yaml
    - apply:
        file: manifests/a02-weather-agent.yaml
    - apply:
        file: manifests/a03-weather-query.yaml
    catch:
    - events: {}

  - name: verify-resources
    try:
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Tool
          metadata:
            name: weather-tool
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: weather-agent
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: weather-query
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: weather-query
          status:
            (response != null): true
            (response.target.name): 'weather-agent'
            (length(response.content) > `10`): true
    catch:
    - events: {}
    - script:
        content: |
          echo "=== Debug: Checking resources ==="
          kubectl get model,agent,tool,query -n $NAMESPACE 2>/dev/null || true
          kubectl describe query weather-query -n $NAMESPACE 2>/dev/null || echo "Query not found"
          kubectl logs -l app.kubernetes.io/name=mock-llm -n $NAMESPACE --tail=50 2>/dev/null || true
        env:
        - name: NAMESPACE
          value: ($namespace)

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
