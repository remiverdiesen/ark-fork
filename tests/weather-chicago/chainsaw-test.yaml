apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: weather-chicago
spec:
  description: Test weather agent with HTTP tool chaining using mock weather API and mock LLM
  steps:
  - name: setup-mock-llm
    try:
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)

  - name: wait-for-model-ready
    try:
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model-mock
        timeout: 90s
        for:
          condition:
            name: ModelAvailable
            value: 'True'

  - name: run-query
    try:
    - apply:
        file: manifests/a00-mock-server.yaml
    - wait:
        apiVersion: apps/v1
        kind: Deployment
        name: mock-weather-api
        timeout: 2m
        for:
          condition:
            name: Available
            value: 'True'
    - script:
        content: |
          MOCK_URL="http://mock-weather-api.$NAMESPACE.svc.cluster.local"
          kubectl run test-mock-ready --image=curlimages/curl --rm -i --restart=Never -n $NAMESPACE -- \
            curl -f -s --retry 5 --retry-connrefused --retry-delay 1 "${MOCK_URL}/v1/search?name=Chicago&count=1"
        timeout: 30s
        env:
        - name: NAMESPACE
          value: ($namespace)
    - script:
        content: |
          MOCK_URL="http://mock-weather-api.$NAMESPACE.svc.cluster.local"
          kubectl apply -f - -n $NAMESPACE <<EOF
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Tool
          metadata:
            name: get-coordinates
          spec:
            type: http
            description: "Returns coordinates for the given city name."
            inputSchema:
              type: object
              properties:
                city:
                  type: string
                  description: City name to get coordinates for
              required: ["city"]
            http:
              url: $MOCK_URL/v1/search?name={city}&count=1
          EOF
          kubectl apply -f - -n $NAMESPACE <<EOF
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Tool
          metadata:
            name: get-forecast
          spec:
            type: http
            description: "Get weather forecast for a specific location and time period"
            inputSchema:
              type: object
              properties:
                office:
                  type: string
                  description: "Weather office identifier (e.g., LOT)"
                gridX:
                  type: integer
                  description: "Grid X coordinate"
                gridY:
                  type: integer
                  description: "Grid Y coordinate"
              required: ["office", "gridX", "gridY"]
            http:
              url: $MOCK_URL/gridpoints/{office}/{gridX},{gridY}/forecast
          EOF
        env:
        - name: NAMESPACE
          value: ($namespace)
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Tool
          metadata:
            name: get-coordinates
          status:
            state: Ready
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Tool
          metadata:
            name: get-forecast
          status:
            state: Ready
    - apply:
        file: manifests/a05-weather-agent.yaml
    - apply:
        file: manifests/a06-chicago-query.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: chicago-weather-agent
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: chicago-weather-query
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: chicago-weather-query
          status:
            (response != null): true
            (response.target.name): 'chicago-weather-agent'
            (contains(response.content, 'Chicago')): true
            (contains(response.content, '72')): true
            (contains(response.content, 'Partly Cloudy')): true
            (tokenUsage.totalTokens > `50`): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: chicago-weather-query

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
