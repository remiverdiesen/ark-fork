apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: query-parameter-ref
spec:
  steps:
    - try:
      # Install mock-llm with Ark Model and custom config
      - script:
          timeout: 180s
          content: |
            bash ../shared/install-mock-llm.sh
          env:
          - name: NAMESPACE
            value: ($namespace)
      # Apply ConfigMap, Secret
      - apply:
          file: manifests/a0[2-3]-*.yaml
      - assert:
          resource:
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: query-config
      - assert:
          resource:
            apiVersion: v1
            kind: Secret
            metadata:
              name: query-secrets
      # Wait for Model to be available before creating agents/queries
      - wait:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Model
          name: mock-gpt-4.1
          timeout: 3m
          for:
            condition:
              name: ModelAvailable
              value: 'True' 
      # Apply agents first
      - apply:
          file: manifests/a0[4,6]-*.yaml
      - assert:
          resource:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Agent
            metadata:
              name: test-agent
      - assert:
          resource:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Agent
            metadata:
              name: test-agent-nested
      # Now apply queries after Model and Agents are ready
      - apply:
          file: manifests/a0[5,7]-*.yaml
      - wait:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          name: test-query-with-params
          timeout: 60s
          for:
            condition:
              name: Completed
              value: 'True'
      # Response is immutable after phase: done, no need to retry
      - assert:
          timeout: 1s
          resource:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Query
            metadata:
              name: test-query-with-params
            status:
              (response != null): true
              (response.target.name): 'test-agent'
              # Verify system message echoed back with resolved parameter
              (contains(response.raw, '"role":"system"')): true
              (contains(response.content, 'QueryAgent123')): true
      # Test nested valueFrom resolution - Agent referencing Query params that use ConfigMap/Secret
      - wait:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          name: test-query-nested-params
          timeout: 60s
          for:
            condition:
              name: Completed
              value: 'True'
      # Response is immutable after phase: done, no need to retry
      - assert:
          timeout: 1s
          resource:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Query
            metadata:
              name: test-query-nested-params
            status:
              (response != null): true
              (response.target.name): 'test-agent-nested'
              # Verify the agent received the nested-resolved parameters
              (contains(response.content, 'NestedConfigAgent')): true
              (contains(response.content, 'SecretAnalyst')): true
      catch:
      - events: {}
      - describe:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          name: test-query-with-params
      cleanup:
      - script:
          content: |
            helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
          env:
          - name: NAMESPACE
            value: ($namespace)
